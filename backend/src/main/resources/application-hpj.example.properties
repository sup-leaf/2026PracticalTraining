# 虎皮椒支付配置模板（复制为 application-hpj.properties 并填入真实信息）
# 此文件已被 .gitignore 排除，不会提交到 Git
#
# mode 说明：
#   simulate  = 模拟支付（默认，支付永远成功，用于开发测试）
#   production = 真实支付（直连虎皮椒 API，需填入真实 app-id/app-secret）

hpj.mode=simulate
hpj.app-id=your_app_id
hpj.app-secret=your_app_secret
hpj.gateway=https://api.xunhupay.com/payment/do.html
hpj.notify-url=http://localhost:8080/api/payment/notify
